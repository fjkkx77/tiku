<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语阅读与选词填空练习</title>
<style>
  :root{
    --primary:#3b82f6; --primary-dark:#2563eb; --green:#16a34a; --red:#dc2626;
    --bg:#f3f4f6; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --border:#e5e7eb;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Microsoft YaHei",Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);}
  .app{max-width:780px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:10;}
  header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:18px 16px;text-align:center;position:relative;}
  header h1{margin:0;font-size:19px;word-break:break-word;}
  header p{margin:4px 0 0;font-size:12px;opacity:.85;}
  .home-btn{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:19px;text-decoration:none;color:#fff;}
  nav{display:flex;background:#fff;border-bottom:1px solid var(--border);}
  nav button{flex:1;border:none;background:none;padding:11px 4px;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;}
  nav button.active{color:var(--primary-dark);font-weight:bold;border-bottom-color:var(--primary);}
  main{flex:1;padding:14px;}
  .screen{display:none;}
  .screen.active{display:block;}
  .card{background:var(--card);border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .cat-list label{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid var(--border);font-size:14px;}
  .cat-list label:last-child{border-bottom:none;}
  .cat-count{color:var(--muted);font-size:12px;margin-left:auto;}
  .btn{display:inline-block;border:none;border-radius:8px;padding:11px 18px;font-size:15px;cursor:pointer;background:var(--primary);color:#fff;text-align:center;}
  .btn:active{transform:scale(.98);}
  .btn.secondary{background:#fff;color:var(--primary-dark);border:1px solid var(--primary);}
  .btn.green{background:var(--green);}
  .btn.gray{background:#9ca3af;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
  .btn-row .btn{flex:1;}
  .mode-row{display:flex;gap:10px;margin:10px 0;}
  .mode-row label{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;font-size:13px;cursor:pointer;}
  .mode-row input{margin-right:4px;}
  .toplinks{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
  .toplinks span{color:var(--primary-dark);cursor:pointer;}
  .progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;color:var(--muted);flex-wrap:wrap;row-gap:6px;}
  .mode-toggle{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:bold;padding:3px 10px;border-radius:12px;cursor:pointer;white-space:nowrap;background:#eef2ff;color:var(--primary-dark);border:1px solid var(--primary);}
  .mode-toggle.manual{background:#f3f4f6;color:var(--muted);border-color:var(--border);}
  .progress-bar{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--primary);transition:width .25s;}
  .q-tag{display:inline-block;background:#eef2ff;color:var(--primary-dark);font-size:12px;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
  .q-text{font-size:16px;line-height:1.8;margin-bottom:10px;white-space:pre-wrap;overflow-x:auto;word-break:break-word;}
  .q-code{font-family:Consolas,"Courier New",monospace;font-size:13.5px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0;line-height:1.7;white-space:pre-wrap;overflow-x:auto;}
  .opt-list{display:flex;flex-direction:column;margin:10px 0;}
  .opt-row{padding:13px 6px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;}
  .opt-row:last-child{border-bottom:none;}
  .opt-row .opt-label{font-size:13px;color:var(--muted);margin-bottom:3px;}
  .opt-row .opt-text{font-size:14.5px;white-space:pre-wrap;font-family:Consolas,"Microsoft YaHei",monospace;line-height:1.6;}
  .opt-row.selected{background:#eef2ff;}
  .opt-row.selected .opt-label{color:var(--primary-dark);font-weight:bold;}
  .opt-row.disabled{cursor:default;}
  .answer-box .my-ans{font-weight:bold;}
  .answer-box .my-ans.wrong-color{color:var(--red);}
  .answer-box .correct-ans{color:var(--green);font-weight:bold;}
  /* 自己画完整边框方框，不依赖各平台原生input外观（原生样式在不同浏览器/系统下表现差异很大，不可靠） */
  .blank-input{-webkit-appearance:none;appearance:none;border:1.5px solid var(--primary);border-radius:6px;background:#f8fafc;padding:4px 8px;font-size:14.5px;min-width:90px;text-align:center;margin:2px;font-family:Consolas,monospace;color:var(--text);box-shadow:none;}
  .blank-input.correct{border-color:var(--green);background:#ecfdf3;color:var(--green);}
  .blank-input.wrong{border-color:var(--red);background:#fef2f2;color:var(--red);}
  /* iOS Safari会强制改变disabled输入框的颜色和透明度，必须用-webkit-text-fill-color覆盖，否则手机上看不出方框和颜色 */
  .blank-input:disabled{opacity:1;-webkit-text-fill-color:var(--text);background:#f8fafc;}
  .blank-input.correct:disabled{-webkit-text-fill-color:var(--green);background:#ecfdf3;border-color:var(--green);}
  .blank-input.wrong:disabled{-webkit-text-fill-color:var(--red);background:#fef2f2;border-color:var(--red);}
  .blank-row{margin:6px 0;font-size:13px;color:var(--muted);}
  .blank-row b{color:var(--text);font-weight:normal;}
  .answer-box{margin-top:10px;font-size:14px;padding:10px;border-radius:8px;display:none;}
  .answer-box.show{display:block;}
  .answer-box.right{background:#ecfdf3;color:#15803d;}
  .answer-box.wrong{background:#fef2f2;color:#b91c1c;}
  .answer-box .real{font-weight:bold;}
  footer.qfoot{display:flex;gap:10px;margin-top:14px;}
  footer.qfoot .btn{flex:1;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;margin:10px 0;}
  .stat-grid.cols2{grid-template-columns:repeat(2,1fr);}
  .stat-grid div b{display:block;font-size:22px;}
  .stat-grid div span{font-size:12px;color:var(--muted);}
  .stat-click{cursor:pointer;border-radius:8px;padding:6px 2px;transition:background .15s;}
  .stat-click:hover{background:#f3f4f6;}
  .review-item{border-bottom:1px solid var(--border);padding:12px 0;font-size:14px;}
  .review-item:last-child{border-bottom:none;}
  .review-item .qtext{margin-bottom:6px;line-height:1.6;white-space:pre-wrap;}
  .review-item .your-ans{font-size:13px;margin-bottom:2px;}
  .review-item .correct-ans-line{font-size:13px;color:var(--green);}
  .history-item, .wrong-item{border-bottom:1px solid var(--border);padding:10px 0;font-size:14px;}
  .history-item:last-child, .wrong-item:last-child{border-bottom:none;}
  .history-item .top, .wrong-item .top{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-bottom:4px;}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;}
  .wrong-item .qtext{margin-bottom:4px;}
  .wrong-item .ans{color:var(--green);font-size:13px;}
  .badge-cnt{background:#fee2e2;color:#b91c1c;border-radius:10px;font-size:11px;padding:1px 7px;}
  .note{font-size:12px;color:var(--muted);margin-top:6px;}
  .ov-link{font-size:13px;color:var(--primary-dark);cursor:pointer;white-space:nowrap;}
  .ov-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .ov-item{position:relative;aspect-ratio:1;border-radius:8px;border:1.5px solid var(--primary);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--primary-dark);background:#fff;}
  .ov-item.cur{background:var(--primary);color:#fff;border-color:var(--primary);}
  .ov-item.right{background:#ecfdf3;border-color:var(--green);color:#15803d;}
  .ov-item.wrong{background:#fef2f2;border-color:var(--red);color:#b91c1c;}
  .ov-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49;display:none;}
  .ov-backdrop.show{display:block;}
  #screen-overview.active{
    display:block;position:fixed;top:0;right:0;height:100vh;width:320px;max-width:88vw;
    background:#fff;z-index:50;overflow-y:auto;box-shadow:-6px 0 20px rgba(0,0,0,.18);
    padding:16px;animation:ovSlideIn .18s ease;
  }
  @keyframes ovSlideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
  .ov-section-title{font-size:14px;font-weight:bold;color:var(--text);margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .ov-section-title:first-child{margin-top:0;}
  .ov-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .ov-header-row .ov-close{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:0 4px;}
  .ov-legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin-bottom:12px;flex-wrap:wrap;}
  .ov-legend span{display:inline-flex;align-items:center;gap:5px;}
  .ov-dot{width:11px;height:11px;border-radius:3px;display:inline-block;border:1.5px solid var(--primary);}
  .ov-dot.right{background:#ecfdf3;border-color:var(--green);}
  .ov-dot.wrong{background:#fef2f2;border-color:var(--red);}
  .ov-dot.cur{background:var(--primary);border-color:var(--primary);}
  @media (max-width:380px){
    .ov-grid{grid-template-columns:repeat(4,1fr);}
    .blank-input{min-width:64px;font-size:13.5px;}
    header h1{font-size:17px;}
    .opt-row .opt-text{font-size:13.5px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
  <header>
    <a class="home-btn" href="../" title="返回主页" aria-label="返回主页">🏠</a>
    <h1>英语阅读与选词填空练习</h1>
    <p>六单元 · 选词填空＋阅读理解 · 错题本</p>
  </header>
  <nav>
    <button data-screen="home" class="active">开始练习</button>
    <button data-screen="wrongbook">错题本</button>
    <button data-screen="history">练习记录</button>
  </nav>
  </div>
  <main>

    <section class="screen active" id="screen-home">
      <div class="card">
        <div class="toplinks">
          <span id="selAll">全选</span>
          <span id="selNone">清空</span>
          <span id="selWrongOnly">仅选有错题章节</span>
        </div>
        <div class="cat-list" id="catList"></div>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:bold;margin-bottom:6px;">出题方式</div>
        <div class="mode-row">
          <label><input type="radio" name="order" value="seq" checked>原始顺序</label>
          <label><input type="radio" name="order" value="random">随机顺序</label>
        </div>
        <div class="btn-row">
          <button class="btn" id="startBtn">开始练习</button>
        </div>
        <div style="text-align:center;margin-top:10px;">
          <a href="../" style="font-size:13px;color:var(--muted);text-decoration:none;padding:4px 8px;border-radius:6px;display:inline-block;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--muted)'">← 返回刷题主界面</a>
        </div>
      </div>
      <div class="card" style="font-size:12px;color:var(--muted);text-align:center;">
        题库共 <b id="totalQCount">0</b> 题（选词填空6篇含词表 + 阅读理解60题，六单元）
      </div>
    </section>

    <section class="screen" id="screen-quiz">
      <div class="progress-wrap">
        <span id="quizProgressText">1/10</span>
        <div class="progress-bar"><div class="progress-bar-fill" id="quizProgressFill"></div></div>
        <span id="quizScoreText">对0 错0</span>
        <span class="mode-toggle" id="modeToggleBtn">⚡考试宝模式</span>
        <span class="ov-link" id="overviewLink">题目总览</span>
      </div>
      <div class="card">
        <div class="q-tag" id="qTag"></div>
        <div class="q-text" id="qText"></div>
        <div id="qCode" class="q-code" style="display:none;"></div>
        <div id="qBody"></div>
        <div class="answer-box" id="answerBox"></div>
        <footer class="qfoot">
          <button class="btn secondary" id="prevBtn">上一题</button>
          <button class="btn secondary" id="checkBtn">提交答案</button>
          <button class="btn" id="nextBtn" style="display:none;">下一题</button>
        </footer>
      </div>
      <div class="btn-row">
        <button class="btn gray" id="quitQuizBtn">结束并查看结果</button>
      </div>
    </section>

    <!-- 题目总览 -->
    <div class="ov-backdrop" id="ovBackdrop"></div>
    <section class="screen" id="screen-overview">
      <div class="ov-header-row">
        <div style="font-size:16px;font-weight:bold;">题目总览</div>
        <span class="ov-close" id="ovCloseBtn">&times;</span>
      </div>
      <div class="ov-legend">
        <span><span class="ov-dot cur"></span>当前</span>
        <span><span class="ov-dot right"></span>已答对</span>
        <span><span class="ov-dot wrong"></span>已答错</span>
        <span><span class="ov-dot"></span>未作答</span>
      </div>
      <div id="ovContent"></div>
      <div class="btn-row">
        <button class="btn gray" id="ovBackBtn">返回答题</button>
      </div>
    </section>

    <section class="screen" id="screen-result">
      <div class="card">
        <div style="text-align:center;font-size:16px;font-weight:bold;">本次练习结果</div>
        <div class="stat-grid">
          <div><b id="resTotal">0</b><span>总题数</span></div>
          <div><b id="resAnswered">0</b><span>已答</span></div>
          <div><b id="resUnanswered">0</b><span>未答</span></div>

        </div>
        <div class="stat-grid cols2">
          <div class="stat-click" id="resCorrectBox"><b id="resCorrect" style="color:var(--green)">0</b><span>答对（点击查看）</span></div>
          <div class="stat-click" id="resWrongBox"><b id="resWrong" style="color:var(--red)">0</b><span>答错（点击查看）</span></div>
        </div>
        <div style="text-align:center;color:var(--muted);font-size:13px;">正确率 <b id="resRate">0%</b> · 用时 <b id="resTime">0分0秒</b></div>
        <div class="btn-row">
          <button class="btn secondary" id="backToQuizBtn">返回本次练习（继续查看/作答）</button>
        </div>
        <div class="btn-row">
          <button class="btn" id="retryAllBtn">重新练习（同范围）</button>
          <button class="btn secondary" id="retryWrongBtn">只练本次错题</button>
        </div>
        <div class="btn-row">
          <button class="btn gray" id="backHomeBtn">返回首页</button>
        </div>
      </div>
    </section>

    <!-- 答对/答错题目明细 -->
    <section class="screen" id="screen-resultlist">
      <div class="card">
        <div style="font-size:16px;font-weight:bold;margin-bottom:10px;" id="resultListTitle"></div>
        <div id="resultListBody"></div>
      </div>
      <div class="btn-row">
        <button class="btn gray" id="resultListBackBtn">返回结果</button>
      </div>
    </section>

    <section class="screen" id="screen-wrongbook">
      <div class="card" id="wrongbookSummary"></div>
      <div class="card" id="wrongbookList"></div>
    </section>

    <section class="screen" id="screen-history">
      <div class="card" id="historyList"></div>
      <div class="card" style="text-align:center;">
        <button class="btn gray" id="clearHistoryBtn">清空历史记录</button>
      </div>
    </section>

  </main>
</div>

<script>
/* ===================== 题库数据 ===================== */
// type: "mcq" 或 "blank"（ordered:true时按顺序逐空判分）
const QUESTIONS = [
{type:"blank", cat:"第一单元-选词填空", text:"选词填入各空格（参考下方词表，每词限用一次）\n\n1. Even if you're not a hard-core Greenie, there are small acts you can take every day to save both the earth and your (1){{}}. Going DIY with cleaning products is a good way to start. You can use (2){{}} at home that won't cost you any extra money — and that work just as well as the store-bought stuff. Vinegar cuts grease on stove tops and oven doors, and can even whiten your (3){{}} and remove stains from clothes.\n\n2. In the kitchen, going green can save you money and keep you (4){{}}. Cooking at home can cut down the cost of eating out and the takeout containers that you bring home. Buying produce and other raw foods cuts down on (5){{}} that ends up in landfills. You can also look for products that use (6){{}} or bio-degradable packaging. You can even use some of the items you (7){{}} in the trash to upcycle. Plastic grocery bags can be used for all kinds of craft projects.\n\n3. It's easy to ignore, but a great amount of energy gets wasted around the house. You can (8){{}} large appliances and other devices that aren't being used. Changing out your light bulbs is another way to save money. CFL light bulbs are more (9){{}} at first, but they use much less energy than incandescent light bulbs, and last at least eight times longer than regular bulbs. (10){{}} on natural light is another way to make your light bulbs last longer — so open your blinds and enjoy the sunlight!", code:"【词表 A-O】\nA) cost ：n. 价格，v. 花费\nB) enjoy ：v. 喜欢；享受\nC) expensive ：adj. 昂贵的\nD) healthier：adj. 健康的\nE) ignore ：v. 忽视\nF) items ：n.项目；条款\nG) laundry ：n. 洗衣房\nH) packaging：n. 包装材料\nI) projects ：n. 项目；工程v. 计划；投射；表达\nJ) recyclable ：adj. 可循环再用的\nK) relying ：v. 依赖\nL) than：conj. 比；除…外；与其…；一…就；prep. 比；超过\nM) toss ：v. 投掷\nN) unplug ：v. 拔去(电源)插头\nO) wallet：n. 钱包", ans:["wallet", "items", "laundry", "healthier", "packaging", "recyclable", "toss", "unplug", "expensive", "relying"], ordered:true},
{type:"mcq", cat:"第一单元-阅读理解", text:"21. In 2013", options:{"A": "over 39 million cars generated 186 million metric tons of carbon dioxide", "B": "over 39 million cars didn't hit the road to reduce carbon emissions", "C": "recycling and composting reduced carbon dioxide by a large amount", "D": "recycling and composting reduced sharply the carbon dioxide by cars"}, correct:"C"},
{type:"mcq", cat:"第一单元-阅读理解", text:"22. Mixing waste with recyclables leads to a", options:{"A": "stream contamination", "B": "high processing costs", "C": "high recycling rate", "D": "more profits of recycling"}, correct:"B"},
{type:"mcq", cat:"第一单元-阅读理解", text:"23. \"Wishful recycling\" happens when people", options:{"A": "put the waste i n recycling bins", "B": "know the waste can be recycled", "C": "don't know if the waste can be recycled", "D": "express their wish for recycling"}, correct:"C"},
{type:"mcq", cat:"第一单元-阅读理解", text:"24. Which o f the following can be recycled?", options:{"A": "Styrofoam.", "B": "PVC.", "C": "Water bottles.", "D": "Batteries."}, correct:"C"},
{type:"mcq", cat:"第一单元-阅读理解", text:"25. What's the passage mainly about?", options:{"A": "The importance of sorting trash.", "B": "The necessity of using durable goods.", "C": "The benefits of limiting disposable goods.", "D": "The controversy of recycling"}, correct:"A"},
{type:"mcq", cat:"第一单元-阅读理解", text:"26. What's the meaning of the clause \"the joy comes with a dollar sign attached\" in Paragraph 1?", options:{"A": "Installing solar panels at home saves money for consumers.", "B": "Consumers will be paid to install solar panels.", "C": "Solar panels will bring financial gains to consumers.", "D": "The environmental benefit means financial gains."}, correct:"A"},
{type:"mcq", cat:"第一单元-阅读理解", text:"27. Which benefit is guaranteed?", options:{"A": "The federal government's tax credit.", "B": "The state's incentives.", "C": "The utility's help somewhere.", "D": "The installer's services."}, correct:"A"},
{type:"mcq", cat:"第一单元-阅读理解", text:"28. Which is NOT true o f a good solar panels installer?", options:{"A": "He has the necessary permits.", "B": "He'll connect the solar energy system to your home.", "C": "He'll sell your solar electricity to the grid.", "D": "He'll apply for incentives for you."}, correct:"C"},
{type:"mcq", cat:"第一单元-阅读理解", text:"29. Which is the cheapest option for a solar system?", options:{"A": "Pay for it completely.", "B": "Lease it somehow.", "C": "Sell all the electricity generated", "D": "Get bank loans for it."}, correct:"A"},
{type:"mcq", cat:"第一单元-阅读理解", text:"30. If you lease the solar system, you will", options:{"A": "use the electricity for free", "B": "pay more than the local utility charges you", "C": "pay the maintenance fees", "D": "sign a power purchase agreement"}, correct:"D"},
{type:"blank", cat:"第二单元-选词填空", text:"选词填入各空格（参考下方词表，每词限用一次）\n\n1. When it comes to a life partner, discomfort between you and your partner can bring about unhappiness (1){{}}. To feel at home with a partner, a few things need to be in place:\n\n2. Trust and security. Secrets are poison to a relationship, because they lead to an invisible (2){{}} inside the relationship, leaving both people somewhat alone in the world. On the other side of secrets will often be distrust, which is a(n) (3){{}} factor going against a good relationship.\n\n3. Natural chemistry. The (4){{}} between you should be easy and natural, energy exerted should be at the same level, and you should both feel (5){{}}. If you put uneven (不均衡的) energy into the relationship, the relationship will (6){{}} failure someday.\n\n4. Acceptance of weaknesses. You're not perfect, and so is your current or future life-partner. (7){{}} of weaknesses is helpful to a relationship. And one of the worst fates would be to spend most of your life (8){{}} by criticisms for your weaknesses and have to (9){{}} them. This isn't to say people shouldn't work on self-improvement, but when it comes to a life partnership, the healthy attitude is, \"Every person comes with a set of weaknesses, these are my partner's, and they're part of the package I knowingly chose to spend my life with.\" This is the attitude you should hold in order to have the relationship (10){{}}.", code:"【词表 A-O】\nA) undergo   vt. 经历，经受；忍受\nB) exhausting    adj. 使耗尽的;使人精疲力竭的\nC) constantly    adv. 不断地;时常地\nD) correspondence    n. 信件, 函件、通信, 通信联系\nE) endure   vt. 忍耐；容忍\nF) overwhelmed    vt. 覆盖，淹没、压倒，制服；打败\nG) bloom      n. 花、最佳时期, 茂盛时期vi. 开花\nH) exchange   n. 交换；兑换；交易所；交流vt. 交换；交易；兑换\nI) invasion    n. 侵犯；入侵，侵略；侵袭\nJ) hardship    n. 艰难, 困苦\nK) realization    n. 认识, 领会\nL) separation     n. 分离,分开,隔开\nM) enjoyment     n. 愉快，欢乐，满意；令人愉快的事物\nN) impressive     adj. 给人印象深刻的, 感人的\nO) permanent       adj. 永久(性)的, 固定的", ans:["constantly", "separation", "impressive", "exchange", "enjoyment", "undergo", "realization", "overwhelmed", "endure", "bloom"], ordered:true},
{type:"mcq", cat:"第二单元-阅读理解", text:"18. What's known about online dating?", options:{"A": "It has become the most popular way of forming relationships.", "B": "It costs no money to become a member online.", "C": "It provides false pictures and information for users.", "D": "It is rarely criticized for its own sake."}, correct:"D"},
{type:"mcq", cat:"第二单元-阅读理解", text:"19. What's the reason for online dating being introduced?", options:{"A": "To help users make rational choices.", "B": "To provide users with many choices.", "C": "To ask users to do shopping online.", "D": "To help users to try the product before buying."}, correct:"A"},
{type:"mcq", cat:"第二单元-阅读理解", text:"20. How does online dating influence human interactions?", options:{"A": "It measures human interactions objectively.", "B": "It makes human interactions objective.", "C": "It can't reflect the real human interactions.", "D": "It can correct human interactions."}, correct:"C"},
{type:"mcq", cat:"第二单元-阅读理解", text:"21. What is \"love\" according to Alain Badiou?", options:{"A": "Love is reasonable.", "B": "Love is irrational.", "C": "Love is disappointing.", "D": "Love is surprising."}, correct:"B"},
{type:"mcq", cat:"第二单元-阅读理解", text:"22. What's the writer's attitude towards online dating?", options:{"A": "Disapproving.", "B": "Encouraging.", "C": "Faithful.", "D": "Extreme."}, correct:"A"},
{type:"mcq", cat:"第二单元-阅读理解", text:"23. Which of the following best describes Chinese marriage?", options:{"A": "It is practiced with romance.", "B": "It is based on practical aspects.", "C": "It depends on Chinese economy.", "D": "It is associated with parents’ introduction."}, correct:"B"},
{type:"mcq", cat:"第二单元-阅读理解", text:"24. What’s the influence of the one-child policy?", options:{"A": "It puts societal duty before individual desire.", "B": "It drives people to find partners of good resources.", "C": "It makes the young generation develop a sense of responsibility.", "D": "It helps improve the welfare system in China."}, correct:"B"},
{type:"mcq", cat:"第二单元-阅读理解", text:"25. What’s known about children of the 1980s and 1990s?", options:{"A": "They are less anxious about marriage.", "B": "They are from economically good families.", "C": "They learn a lot about pop music and movies.", "D": "They follow the tradition of their parents’ marriage."}, correct:"A"},
{type:"mcq", cat:"第二单元-阅读理解", text:"26. What can be drawn from the passage?", options:{"A": "More rural women will be singles in the near future.", "B": "More urban women will be singles in the near future.", "C": "More urban men will be singles in the near future.", "D": "More rural men will be singles in the near future."}, correct:"D"},
{type:"mcq", cat:"第二单元-阅读理解", text:"27. What’s the writer’s attitude towards Chinese marriage?", options:{"A": "Critical.", "B": "Positive.", "C": "Neutral.", "D": "Negative."}, correct:"C"},
{type:"blank", cat:"第三单元-选词填空", text:"选词填入各空格（参考下方词表，每词限用一次）\n\n1. (1){{}} friendship, it is possible that we know what it is but can’t define it. We know it when we feel it. It’s not a (2){{}}, but something we can feel. It is (3){{}} because it (4){{}} time and energy on both sides.\n\n2. Once it is developed, a friendship will not grow (5){{}}, just as in the case of flowers which would not (6){{}} without enough sunlight and water. Just as we treat a flower garden, so we are supposed to take care of a friendship so that it can (7){{}}.\n\n3. As life goes on, we keep making friends. However, the problem is that anything can (8){{}} a friendship. How is it that some friendships (9){{}} a breakup in a particular form (10){{}} long we want them to last? We cannot deny the fact that lasting friendships consume our investment of time and passion.", code:"【词表 A-O】\nA) affect     vt. 影响\nB) insight     n. 洞察力, 洞悉, 深刻的见解\nC) mutual     adj. 相互的, 彼此的\nD) survive     vi. 幸存\nE) venture     vi. 冒险\nF) neglect     vt. 疏忽，忽视；忽略\nG) flourish     v. 繁荣；昌盛；兴旺\nH) mystery     n. 神秘(性), 秘密(性)\nI) involves     v. 包含；牵涉\nJ) apply to     适用于, 运用于\nK) on its own     独自\nL) end up with     以…告终\nM) no matter how     无论如何\nN) cannot help but     情不自禁；不得不\nO) when it comes to     当涉及到, 当谈到", ans:["when it comes to", "mystery", "mutual", "involves", "on its own", "survive", "flourish", "affect", "end up with", "no matter how"], ordered:true},
{type:"mcq", cat:"第三单元-阅读理解", text:"21. The disadvantages to friendships the author implies in the story are ______.", options:{"A": "impatience and non-confidence", "B": "misunderstanding and distance", "C": "explanation and apology", "D": "the bad things in life"}, correct:"B"},
{type:"mcq", cat:"第三单元-阅读理解", text:"22. What do “the good things in life” most probably refer to in the story?", options:{"A": "Friendship.", "B": "Reassurance.", "C": "Conversation.", "D": "Concentration."}, correct:"A"},
{type:"mcq", cat:"第三单元-阅读理解", text:"23. Their response to the respective apology in the two incidents is ______.", options:{"A": "the silence of the heart", "B": "a quick explanation", "C": "a loving expression", "D": "the catch phrase"}, correct:"D"},
{type:"mcq", cat:"第三单元-阅读理解", text:"24. What can we learn from the series of questions raised by the story teller?", options:{"A": "They are confident of a sustainable friendship.", "B": "They cannot help but break their friendship.", "C": "They are worried about their friendship.", "D": "They find it hard to define friendship."}, correct:"C"},
{type:"mcq", cat:"第三单元-阅读理解", text:"25. The story tells us that ______.", options:{"A": "a real friendship can last despite unfavorable things", "B": "miscommunication is an enemy of friendship", "C": "communication is the key to a friendship", "D": "not every friend is worth the wait"}, correct:"A"},
{type:"mcq", cat:"第三单元-阅读理解", text:"26. In her first email, the reader asked for ______.", options:{"A": "the skill of making friends in life", "B": "the information about distance friendship", "C": "a permission to read an article about friendship", "D": "an answer to the question of changeable friendship"}, correct:"B"},
{type:"mcq", cat:"第三单元-阅读理解", text:"27. The author does not seem ______.", options:{"A": "to have much experience with long-term friendships", "B": "to have any long-term friendship of the opposite sex", "C": "to believe in a friendship that lasts a lifetime", "D": "to think of answering the reader’s email"}, correct:"A"},
{type:"mcq", cat:"第三单元-阅读理解", text:"28. In terms of long-term friendships, the author ______.", options:{"A": "is unfortunate enough to have one", "B": "met her longest close friend", "C": "is not professionally alone", "D": "invited emails of opinion"}, correct:"D"},
{type:"mcq", cat:"第三单元-阅读理解", text:"29. What, according to the passage, can happen to a long-distance friendship when you do not think much of the friend living far away?", options:{"A": "It cannot last long.", "B": "It must be irregular.", "C": "It is fairly unpredictable.", "D": "It is just of physical distance."}, correct:"A"},
{type:"mcq", cat:"第三单元-阅读理解", text:"30. What does the author’s friend imply in saying that “Physical distance does create more distance in frequency of thought and emotion”?", options:{"A": "A friendship has nothing to do with the saying: out of sight, out of mind.", "B": "A friendship can be significantly affected by physical distance.", "C": "There is no such thing as a lifelong friendship in the real world.", "D": "No doubt the years of a friendship vary with individuals."}, correct:"B"},
{type:"blank", cat:"第四单元-选词填空", text:"选词填入各空格（参考下方词表，每词限用一次）\n\n1. Tony Tang, a resident of Shanghai, wanders among the stalls (摊位) of foreign universities and middle schools at the Shanghai East Asia Exhibition Hall, looking for an ideal (1){{}} for his 13-year-old son to study abroad.\n\n2. “My son is a student of the (2){{}} Shanghai Foreign Language School. He spends all of his time on his studies and the school puts great (3){{}} on its students. Our family hopes to send him to a school where he does not need to worry so much about his (4){{}} scores,” the man said.\n\n3. Nowadays, (5){{}} of an education system that focuses on academic scores but not pupils’ overall development, a growing number of Chinese families are making (6){{}} to send their children abroad, even at a young age, for the sake of a broader education.\n\n4. Many have already seen the benefit. Andy Wang from Guangdong said her 16-year-old daughter was happy (7){{}} high school in Montreal and the family was planning to send her to university in Canada or the US in the future.\n\n5. “At first, my daughter was (8){{}} to go,” she said. “She thought it would be too hard for her. As the only child of our family, she had never lived on her own. But we (9){{}} to our decision and told her that studying abroad would be good for her future. She felt (10){{}} to obey our instructions for her future. Now she is so happy that she followed our arrangement.”", code:"【词表 A-O】\nA) academic  adj. 学院的；学术的；理论的，n. 大学生，大学教师；学者\nB) attending  adj. (医生)主治的\nC) destination  n. 目的地, 终点\nD) distinguished  adj. 卓越的;著名的;受人尊敬的\nE) gripn. 紧握，抓牢；掌握，控制；理解力，控制力；握法，手法；发夹；把手vt. & vi. 紧握，抓紧；吸引，引起\nF) hesitate  vi. 踌躇，犹豫；不愿\nG) interpretation  n. 解释，说明；诠释，表演；演奏\nH) linger  vi. 逗留, 徘徊，缓慢消失\nI) mysterious  adj. 神秘的; 难以理解的，诡秘的\nJ) obligated  vt. 使(在法律或道义上)负有责任或义务\nK) preparations  n. 准备, 预备，安排, 筹备\nL) pressure  n. 压力；压迫，压强vt. 迫使；密封；使……增压\nM) reluctant  adj. 不情愿的, 勉强的\nN) stuck  v. 刺（stick的过去式）adj. 不能动的；被卡住的\nO) tired  adj. 疲倦的；厌倦的，厌烦的v. 疲倦；对…腻烦（tire的过去分词形式）", ans:["destination", "distinguished", "pressure", "academic", "tired", "preparations", "attending", "reluctant", "stuck", "obligated"], ordered:true},
{type:"mcq", cat:"第四单元-阅读理解", text:"21. What is the passage mainly about?", options:{"A": "Causes of culture shock.", "B": "Problems of culture shock.", "C": "Stages of culture shock.", "D": "Solutions to culture shock."}, correct:"C"},
{type:"mcq", cat:"第四单元-阅读理解", text:"22. What does the first paragraph tell us about culture shock?", options:{"A": "Its length can differ from one person to person.", "B": "It can be avoided if one can speak the language.", "C": "The reactions to culture shock are the same.", "D": "The five stages involve every person in the same length."}, correct:"A"},
{type:"mcq", cat:"第四单元-阅读理解", text:"23. How do new comers usually feel when they first arrive in a new country?", options:{"A": "They are pleased by all the new things.", "B": "They are disappointed at what they see.", "C": "They miss their family and friends at home.", "D": "They cannot help feeling irritated or frustrated."}, correct:"A"},
{type:"mcq", cat:"第四单元-阅读理解", text:"24. What do foreigners tend to do in the regression stage of culture shock?", options:{"A": "To enjoy the delicious new food.", "B": "To complain about their home country.", "C": "To make friends with the local people.", "D": "To watch videos from their home country."}, correct:"D"},
{type:"mcq", cat:"第四单元-阅读理解", text:"25. Why do people experience reverse culture shock?", options:{"A": "Their taste has changed when they are away.", "B": "They have got used to the foreign culture.", "C": "They have become more critical than before.", "D": "New problems have developed in their country."}, correct:"B"},
{type:"mcq", cat:"第四单元-阅读理解", text:"26. What is the passage mainly about?", options:{"A": "How to improve American education.", "B": "How to enter a top-ranking master’s program in America.", "C": "How to apply for a master’s program without any trouble.", "D": "How to attract more international students to America."}, correct:"B"},
{type:"mcq", cat:"第四单元-阅读理解", text:"27. What does the first paragraph tell us?", options:{"A": "American universities enroll more students than before.", "B": "It is not easy to get a place in a good master’s program.", "C": "Competition is much tougher than before at college.", "D": "Americans don’t want to work as teachers or administrators."}, correct:"B"},
{type:"mcq", cat:"第四单元-阅读理解", text:"28. What Mary Poplin says in the second paragraph mainly emphasizes the importance of ______.", options:{"A": "solid grades", "B": "continuing education", "C": "past experience", "D": "social network"}, correct:"C"},
{type:"mcq", cat:"第四单元-阅读理解", text:"29. What does the passage tell us about the Curry school at the University of Virginia?", options:{"A": "It does not have very high requirements for students.", "B": "It encourages its students to question the system.", "C": "It values students’ experience and goals more than their GPA.", "D": "It gives no chance to unimpressive undergraduates."}, correct:"C"},
{type:"mcq", cat:"第四单元-阅读理解", text:"30. What is the last paragraph mainly about?", options:{"A": "How to choose a suitable master’s program in education schools.", "B": "What to know about the differences between the master’s programs.", "C": "Why to choose a school like the University of Connecticut.", "D": "Where to locate the popular master’s programs in the USA."}, correct:"A"},
{type:"blank", cat:"第五单元-选词填空", text:"选词填入各空格（参考下方词表，每词限用一次）\n\n1. How long have (1){{}} industrialists been dreaming about flying cars? So long that they’re not called flying cars anymore. Now they’re “roadable aircraft”. And while the (2){{}} for success of such roadable aircrafts are still in doubt, that doesn’t mean the (3){{}} of the flying vehicle is dead. We might just need to come at the problem from a different direction.\n\n2. One such new (4){{}} is the PAL-V (personal air land vehicle [车辆]) formed in Europe that changes from a road-going three-wheel motorcycle into a gyrocopter (旋翼机) that appears to fly as well as it drives — which is to say very well in both regards. Where the flying cars have suffered from a lack of lateral stability (横向稳定性) in flight and mechanical (5){{}} on the ground, the PAL-V flies as well as any gyrocopter you’re likely to see and, thanks (6){{}} its wonderful suspension (悬浮) system, drives like one of the best three-wheel motorcycles in the streets.\n\n3. The Dutch company behind the project has completed first testing of the PAL-V One prototype (样品) and (7){{}} that it could travel through the air over a distance of up to 275 nautical miles (海里) at a (8){{}} of 95 knots (节). The company recently announced it will begin production of the PAL-V with a limited (9){{}} of 45 vehicles priced at around $400,000 apiece.\n\n4. So while the flying car might not have a place in immediate (10){{}}, perhaps a flying, three-wheeled gyrocopter will.", code:"【词表 A-O】\nA) vehicle\nB) approach\nC) confirmed\nD) aviation\nE) future\nF) attach\nG) chances\nH) transportation\nI) concept\nJ) feature\nK) to\nL) complexity\nM) number\nN) speed\nO) flight", ans:["aviation", "chances", "concept", "approach", "complexity", "to", "confirmed", "speed", "number", "future"], ordered:true},
{type:"mcq", cat:"第五单元-阅读理解", text:"21. What do futurists dream of?", options:{"A": "Owning a personal airplane.", "B": "Attending to the duties of a pilot.", "C": "Making planes with automatic piloting.", "D": "Flying an airplane by themselves."}, correct:"C"},
{type:"mcq", cat:"第五单元-阅读理解", text:"22. What is the main characteristic of the new kind of traveler?", options:{"A": "They have considerable interest in learning to fly.", "B": "They like owning and flying a personal airplane.", "C": "They like to speak to the flight computer.", "D": "They want to fly an airplane with minimal efforts."}, correct:"D"},
{type:"mcq", cat:"第五单元-阅读理解", text:"23. Which of the following is true of the virtual pilot on such futuristic airplanes?", options:{"A": "It is not as good as a human pilot.", "B": "It knows everything about aerodynamics.", "C": "It can easily replace a human pilot.", "D": "It can take over in times of emergency."}, correct:"A"},
{type:"mcq", cat:"第五单元-阅读理解", text:"24. It is still necessary for human pilots on the ground to control such a plane because ______.", options:{"A": "such a plane is no more than an unmanned aerial vehicle", "B": "the virtual pilot cannot handle an emergency", "C": "human pilots can make more money for this", "D": "there is a datalink connection to the controls"}, correct:"B"},
{type:"mcq", cat:"第五单元-阅读理解", text:"25. Which of the following can serve as a proper title for the passage?", options:{"A": "The New Kind of Traveler", "C": "The Virtual Pilot", "B": "The Fully Automated Airplane", "D": "The Removed Human Pilot"}, correct:"B"},
{type:"mcq", cat:"第五单元-阅读理解", text:"26. What is NASA trying to do?", options:{"A": "To make carbon nanotubes.", "B": "To protect astronauts from ions.", "C": "To make a new discovery.", "D": "To build a super spaceship."}, correct:"D"},
{type:"mcq", cat:"第五单元-阅读理解", text:"27. Carbon nanotubes could be used to make the skins of spacecraft because ______.", options:{"A": "they are much lighter than metal", "B": "they are 600 times stronger than steel", "C": "they can shield the spacecraft from radiation", "D": "they can break ions in space rays"}, correct:"C"},
{type:"mcq", cat:"第五单元-阅读理解", text:"28. What will happen when ions hit the metal on a spaceship?", options:{"A": "Some worse radiation will be produced.", "B": "All radiation will be blocked out.", "C": "The metal on the spaceship will break up.", "D": "The ions will move at high speeds."}, correct:"A"},
{type:"mcq", cat:"第五单元-阅读理解", text:"29. Tiny sensors will be built into the new spaceship so that ______.", options:{"A": "the computer brain can feel the smallest pinpricks", "B": "the spaceship can have human sensations", "C": "the sensors can send signals to the spaceship", "D": "the spaceship will be capable of repairing itself"}, correct:"D"},
{type:"mcq", cat:"第五单元-阅读理解", text:"30. What is the passage mainly about?", options:{"A": "How to build a future spaceship.", "B": "How to make use of carbon nanotubes.", "C": "How to protect astronauts in space.", "D": "How to block out radiation."}, correct:"A"},
{type:"blank", cat:"第六单元-选词填空", text:"选词填入各空格（参考下方词表，每词限用一次）\n\n1. As (1){{}} by the dictionary, to innovate is to do something (2){{}}, and creation is about making or bringing into existence something new. Believe it or not, anybody can be a(n) (3){{}} for such an ability. You are among them; you will realize it when you have awakened your own potential.\n\n2. What do you expect of your college education? You will most probably ask for an emphasis to be placed on the training of innovation and creativity in (4){{}} education, because you don’t want to be trained to be the passive recipients of knowledge, but to be (5){{}} into active users of the knowledge you have learned. This (6){{}} DIY, a(n) (7){{}} experience that involves putting your hands on something new. Most of the time, it requires teamwork. When you (8){{}} a new project, you need to (9){{}} for a brainstorm (集思广益). There you tend to look at the problem from different angles and come up with different approaches. That’s the way we innovate or create something new.\n\n3. No doubt China is becoming a manufacturing power in the world. Are you ready to get involved to (10){{}} something new in the near future?", code:"【词表 A-O】\nA) formal   adj. 正式的；拘谨的；有条理的\nB) transformed  vt. & vi. 改变\nC) component\nD) tendency\nE) defined\nF) manufacture\nG) specialize\nH) candidate\nI) tinker with\nJ) interact with\nK) calls for\nL) work on\nM) in a new way\nN) experimental\nO) get together", ans:["defined", "in a new way", "candidate", "formal", "transformed", "calls for", "experimental", "work on", "get together", "manufacture"], ordered:true},
{type:"mcq", cat:"第六单元-阅读理解", text:"21. For college students, the most important thing about finding a summer job ______.", options:{"A": "is to be armed with a well-written resume", "B": "is not the job itself but the money to make", "C": "is to know the importance of independence", "D": "is a chance to get working experience"}, correct:"B"},
{type:"mcq", cat:"第六单元-阅读理解", text:"22. What is the author mainly trying to say to college students?", options:{"A": "Not to take the summer job seriously.", "B": "To keep next semester in mind.", "C": "To take a short-term view on summer jobs.", "D": "Not just simply to find a summer job."}, correct:"D"},
{type:"mcq", cat:"第六单元-阅读理解", text:"23. The piece of advice from the author is ______.", options:{"A": "to look for a serious romantic partner", "B": "to pursue a well-directed career", "C": "to have startup capital(启动资金)", "D": "to have a good credit score"}, correct:"D"},
{type:"mcq", cat:"第六单元-阅读理解", text:"24. What, as suggested by the author, are college students supposed to do?", options:{"A": "To make the interest rate affordable.", "B": "To get a bank loan to prove their credit.", "C": "To have a history of good credit habits.", "D": "To have the job done in just a couple of years."}, correct:"C"},
{type:"mcq", cat:"第六单元-阅读理解", text:"25. Which of the following can most probably refer to the credit report?", options:{"A": "ASAP.", "B": "BTW.", "C": "FYR.", "D": "DIY."}, correct:"D"},
{type:"mcq", cat:"第六单元-阅读理解", text:"26. First of all, according to the passage, finding a new job ______.", options:{"A": "requires preparation", "B": "needs professional experience", "C": "can be extremely easy for someone at the senior level", "D": "takes time"}, correct:"D"},

QUESTIONS.forEach((q,i)=>q.id="q"+i);
const CATS = [...new Set(QUESTIONS.map(q=>q.cat))];

/* ===================== 本地存储 ===================== */
const LS_HISTORY="engreadingquiz_history", LS_WRONGBOOK="engreadingquiz_wrongbook", LS_EXAMMODE="engreadingquiz_exammode";
function loadJSON(key,def){ try{ return JSON.parse(localStorage.getItem(key)) || def; }catch(e){ return def; } }
function saveJSON(key,val){ localStorage.setItem(key, JSON.stringify(val)); }
let history = loadJSON(LS_HISTORY, []);
let wrongbook = loadJSON(LS_WRONGBOOK, {});

/* ===================== 考试宝模式（选对自动跳题，仅对单选题生效） ===================== */
const EXAM_AUTOADVANCE_DELAY = 550;
let examMode = (localStorage.getItem(LS_EXAMMODE) ?? "true") === "true";
let autoAdvanceTimer = null;
function applyModeToggleUI(){
  const btn = document.getElementById("modeToggleBtn");
  btn.textContent = examMode ? "⚡考试宝模式" : "✍️手动模式";
  btn.classList.toggle("manual", !examMode);
}
function scheduleAutoAdvance(idxAtSubmit){
  if(autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
  autoAdvanceTimer = setTimeout(()=>{
    autoAdvanceTimer = null;
    if(session.idx === idxAtSubmit && session.idx < session.queue.length-1){
      session.idx++;
      renderQuestion();
    }
  }, EXAM_AUTOADVANCE_DELAY);
}
document.getElementById("modeToggleBtn").onclick=()=>{
  examMode = !examMode;
  localStorage.setItem(LS_EXAMMODE, examMode?"true":"false");
  applyModeToggleUI();
  const saved = session.answers && session.answers[session.idx];
  const q = session.queue && session.queue[session.idx];
  if(!saved && q && q.type==="mcq") document.getElementById("checkBtn").style.display = examMode?"none":"inline-block";
};
applyModeToggleUI();

/* ===================== 工具函数 ===================== */
function normalize(s){
  return (s||"").trim().toLowerCase().replace(/[\s;；]/g,"");
}
function isCorrect(userInput, acceptStr){
  const options = acceptStr.split("|");
  const u = normalize(userInput);
  if(!u) return false;
  for(const opt of options){
    const o = normalize(opt);
    if(u===o) return true;
    // 只允许"用户答案包含完整正确答案"（容忍多写了无关字），
    // 不允许反向（正确答案包含用户答案）——否则用户答了不完整/截断的内容也会被判对
    if(o.length>=4 && u.includes(o)) return true;
    // 顺序无关匹配：对原始字符串按"和/、/，/,"拆分，各部分分别normalize后排序比较
    const splitRe = /[和、，,]/;
    const oParts = opt.split(splitRe).map(normalize).filter(Boolean).sort();
    const uParts = userInput.split(splitRe).map(normalize).filter(Boolean).sort();
    if(oParts.length>1 && oParts.length===uParts.length && oParts.every((p,i)=>p===uParts[i])) return true;
  }
  return false;
}
function gradeBlanksSet(userInputs, expectedList){
  const n = expectedList.length;
  const used = new Array(n).fill(false);
  const assignment = new Array(n).fill(-1);
  for(let i=0;i<userInputs.length;i++){
    for(let j=0;j<n;j++){
      if(!used[j] && isCorrect(userInputs[i], expectedList[j])){ used[j]=true; assignment[i]=j; break; }
    }
  }
  const allCorrect = assignment.every(a=>a!==-1);
  return {allCorrect, assignment};
}
function gradeOrdered(userInputs, expectedList){
  const assignment = expectedList.map((exp,i)=> isCorrect(userInputs[i]||'',exp) ? i : -1);
  const allCorrect = assignment.every(a=>a!==-1);
  return {allCorrect, assignment};
}
function fmtTime(sec){ const m=Math.floor(sec/60), s=sec%60; return m+"分"+s+"秒"; }
function fmtDate(ts){ const d=new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }
function escapeHtml(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ===================== 屏幕切换 ===================== */
function showScreen(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("ovBackdrop").classList.remove("show");
  document.getElementById("screen-"+name).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  const navBtn = document.querySelector(`nav button[data-screen="${name}"]`);
  if(navBtn) navBtn.classList.add("active");
  if(name==="wrongbook") renderWrongbook();
  if(name==="history") renderHistory();
}
document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click", ()=>{
  if(typeof session!=="undefined"&&session&&session.answers&&session.answers.some(a=>a!==null)&&document.getElementById("screen-quiz")&&document.getElementById("screen-quiz").classList.contains("active")){
    if(!confirm("当前练习进度将会丢失，确定要离开吗？"))return;
  }
  showScreen(b.dataset.screen);
}));

/* ===================== 首页：章节选择 ===================== */
function renderCatList(){
  const wb = wrongbook;
  const list = document.getElementById("catList");
  list.innerHTML = CATS.map(cat=>{
    const cnt = QUESTIONS.filter(q=>q.cat===cat).length;
    const wcnt = Object.values(wb).filter(w=>w.cat===cat).length;
    return `<label>
      <input type="checkbox" class="catChk" value="${cat}" checked>
      ${cat}
      <span class="cat-count">${cnt}题${wcnt?` · <span class="badge-cnt">${wcnt}错</span>`:""}</span>
    </label>`;
  }).join("");
  document.getElementById("totalQCount").textContent = QUESTIONS.length;
}
document.getElementById("selAll").onclick=()=>document.querySelectorAll(".catChk").forEach(c=>c.checked=true);
document.getElementById("selNone").onclick=()=>document.querySelectorAll(".catChk").forEach(c=>c.checked=false);
document.getElementById("selWrongOnly").onclick=()=>{
  const wrongCats = new Set(Object.values(wrongbook).map(w=>w.cat));
  document.querySelectorAll(".catChk").forEach(c=>c.checked=wrongCats.has(c.value));
};

/* ===================== 答题逻辑 ===================== */
let session = null; // {queue, idx, answers[], startTime, scopeLabel}
let selectedOpt = null;

function startQuiz(questionPool, scopeLabel){
  const order = document.querySelector('input[name="order"]:checked').value;
  let pool = questionPool.slice();
  if(order==="random"){
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  }
  session = { queue:pool, idx:0, answers:new Array(pool.length).fill(null), startTime:Date.now(), scopeLabel };
  showScreen("quiz");
  renderQuestion();
}
function currentQ(){ return session.queue[session.idx]; }
function sessionStats(){
  let correct=0, wrong=0;
  session.answers.forEach(a=>{ if(a){ a.allCorrect? correct++ : wrong++; } });
  return {correct, wrong};
}

function renderQuestion(){
  if(autoAdvanceTimer){ clearTimeout(autoAdvanceTimer); autoAdvanceTimer=null; }
  const q = currentQ();
  const saved = session.answers[session.idx];
  selectedOpt = saved && saved.selectedOpt ? saved.selectedOpt : null;
  const stats = sessionStats();
  document.getElementById("qTag").textContent = q.cat;
  document.getElementById("quizProgressText").textContent = `${session.idx+1}/${session.queue.length}`;
  document.getElementById("quizProgressFill").style.width = `${(session.idx/session.queue.length)*100}%`;
  document.getElementById("quizScoreText").textContent = `对${stats.correct} 错${stats.wrong}`;
  document.getElementById("qText").textContent = q.text;
  document.getElementById("prevBtn").disabled = session.idx===0;

  const codeEl = document.getElementById("qCode");
  if(q.code){ codeEl.style.display="block"; codeEl.textContent = q.code.replace(/\{\{\}\}/g,"______"); }
  else { codeEl.style.display="none"; codeEl.textContent=""; }

  const body = document.getElementById("qBody");
  const box=document.getElementById("answerBox");
  box.className="answer-box"; box.innerHTML="";

  if(q.type==="mcq"){
    const letters = Object.keys(q.options);
    body.innerHTML = `<div class="opt-list">` + letters.map(L=>
      `<div class="opt-row" data-letter="${L}"><div class="opt-label">${L}.</div><div class="opt-text">${escapeHtml(q.options[L])}</div></div>`
    ).join("") + `</div>`;
    if(saved){
      body.querySelectorAll(".opt-row").forEach(el=>{ el.classList.add("disabled"); });
      showAnswerBoxMcq(q, saved.allCorrect, saved.selectedOpt);
      document.getElementById("checkBtn").style.display="none";
    } else {
      body.querySelectorAll(".opt-row").forEach(el=>{
        el.addEventListener("click", ()=>{
          if(el.classList.contains("disabled")) return;
          body.querySelectorAll(".opt-row").forEach(o=>o.classList.remove("selected"));
          el.classList.add("selected");
          selectedOpt = el.dataset.letter;
          if(examMode){
            const isRight = selectedOpt===q.correct;
            document.getElementById("checkBtn").click();
            if(isRight) scheduleAutoAdvance(session.idx);
          }
        });
      });
      document.getElementById("checkBtn").style.display = examMode ? "none" : "inline-block";
    }
    updateNextBtn();
  } else {
    body.innerHTML = "";
    let n=0;
    if(q.text.includes("{{}}")){
      const safeT = escapeHtml(q.text).replace(/\n/g,'<br>');
      document.getElementById("qText").innerHTML = safeT.replace(/\{\{\}\}/g, ()=>{
        const idx=n++; return `<input type="text" class="blank-input" data-idx="${idx}" autocomplete="off">`;
      });
    }
    if(q.code && q.code.includes("{{}}")){
      codeEl.innerHTML = escapeHtml(q.code).replace(/\{\{\}\}/g, ()=>{
        const idx=n++; return `<input type="text" class="blank-input" data-idx="${idx}" autocomplete="off">`;
      });
    }
    const inputs = document.querySelectorAll("#qText .blank-input, #qCode .blank-input");
    if(saved){
      inputs.forEach((inp,i)=>{
        inp.value = saved.userInputs[i] || "";
        inp.classList.add(saved.assignment[i]!==-1 ? "correct" : "wrong");
        inp.disabled = true;
      });
      showAnswerBoxBlank(q, saved.allCorrect);
      document.getElementById("checkBtn").style.display="none";
    } else {
      inputs.forEach((inp,i)=>{
        inp.addEventListener("keydown",(e)=>{
          if(e.key==="Enter"){
            if(i<inputs.length-1) inputs[i+1].focus();
            else document.getElementById("checkBtn").click();
          }
        });
      });
      if(inputs[0]) inputs[0].focus();
      document.getElementById("checkBtn").style.display="inline-block";
    }
    updateNextBtn();
  }
}

function updateNextBtn(){
  const nextBtnEl = document.getElementById("nextBtn");
  const isLast = session.idx === session.queue.length-1;
  nextBtnEl.style.display = "inline-block";
  nextBtnEl.textContent = isLast ? "已是最后一题" : "下一题";
  nextBtnEl.disabled = isLast;
}

function showAnswerBoxMcq(q, allCorrect, userOpt){
  const box=document.getElementById("answerBox");
  box.classList.add("show", allCorrect?"right":"wrong");
  box.innerHTML = `<b>我的答案：</b><span class="my-ans${allCorrect?"":" wrong-color"}">${userOpt||"未作答"}</span>`
    + `　　<b>正确答案：</b><span class="correct-ans">${q.correct}. ${escapeHtml(q.options[q.correct])}</span>`;
}
function showAnswerBoxBlank(q, allCorrect){
  const box=document.getElementById("answerBox");
  box.classList.add("show", allCorrect?"right":"wrong");
  let correctAnsText;
  if(q.ordered){
    correctAnsText = q.ans.map((a,i)=>`(${i+1})${a.split("|")[0]}`).join("　");
  } else {
    correctAnsText = q.ans.map(a=>a.split("|")[0]).join("  /  ");
  }
  box.innerHTML = (allCorrect ? `✔ 回答正确！` : `✘ 回答有误。`) + ` 参考答案：<span class="real">${escapeHtml(correctAnsText)}</span>`;
}

document.getElementById("checkBtn").onclick=()=>{
  const q = currentQ();
  let allCorrect = true;
  let answerRecord;

  if(q.type==="mcq"){
    allCorrect = selectedOpt===q.correct;
    document.querySelectorAll("#qBody .opt-row").forEach(el=>{ el.classList.add("disabled"); });
    showAnswerBoxMcq(q, allCorrect, selectedOpt);
    answerRecord = { allCorrect, selectedOpt };
  } else {
    const inputs = [...document.querySelectorAll("#qText .blank-input, #qCode .blank-input")];
    const userInputs = inputs.map(inp=>inp.value);
    const graded = q.ordered ? gradeOrdered(userInputs, q.ans) : gradeBlanksSet(userInputs, q.ans);
    allCorrect = graded.allCorrect;
    inputs.forEach((inp,i)=>{
      inp.classList.add(graded.assignment[i]!==-1 ? "correct" : "wrong");
      inp.disabled = true;
    });
    showAnswerBoxBlank(q, allCorrect);
    answerRecord = { allCorrect, userInputs, assignment: graded.assignment };
  }

  session.answers[session.idx] = answerRecord;

  const MASTER_STREAK = 3;
  if(allCorrect){
    if(wrongbook[q.id]){
      wrongbook[q.id].correctStreak = (wrongbook[q.id].correctStreak||0) + 1;
      if(wrongbook[q.id].correctStreak >= MASTER_STREAK){ delete wrongbook[q.id]; }
    }
  } else {
    wrongbook[q.id] = { cat:q.cat, type:q.type, text:q.text, code:q.code||"", options:q.options||null, correct:q.correct||null, ans:q.ans||null, wrongCount:(wrongbook[q.id]?.wrongCount||0)+1, correctStreak:0, lastWrongAt:Date.now() };
  }
  saveJSON(LS_WRONGBOOK, wrongbook);

  document.getElementById("checkBtn").style.display="none";
  updateNextBtn();
  const stats = sessionStats();
  document.getElementById("quizScoreText").textContent = `对${stats.correct} 错${stats.wrong}`;
};

document.getElementById("prevBtn").onclick=()=>{
  if(session.idx>0){ session.idx--; renderQuestion(); }
};
document.getElementById("nextBtn").onclick=()=>{
  if(session.idx < session.queue.length-1){ session.idx++; renderQuestion(); }
};
document.getElementById("quitQuizBtn").onclick=()=>{
  if(confirm("确定结束本次练习并查看结果吗？")) finishQuiz();
};

function openOverview(){ renderOverview(); document.getElementById("screen-overview").classList.add("active"); document.getElementById("ovBackdrop").classList.add("show"); }
function closeOverview(){ document.getElementById("screen-overview").classList.remove("active"); document.getElementById("ovBackdrop").classList.remove("show"); }
document.getElementById("overviewLink").onclick=openOverview;
document.getElementById("ovBackBtn").onclick=closeOverview;
document.getElementById("ovCloseBtn").onclick=closeOverview;
document.getElementById("ovBackdrop").onclick=closeOverview;

function renderOverviewGrid(indices){
  return `<div class="ov-grid">` + indices.map(i=>{
    const a = session.answers[i];
    let cls = "";
    if(i===session.idx) cls += " cur";
    if(a) cls += a.allCorrect ? " right" : " wrong";
    return `<div class="ov-item${cls}" data-idx="${i}">${i+1}</div>`;
  }).join("") + `</div>`;
}
function renderOverview(){
  const content = document.getElementById("ovContent");
  const mcqIdx = [], blankIdx = [];
  session.queue.forEach((q,i)=> (q.type==="mcq" ? mcqIdx : blankIdx).push(i));
  let html = "";
  if(mcqIdx.length) html += `<div class="ov-section-title">一、单选题（${mcqIdx.length}题）</div>` + renderOverviewGrid(mcqIdx);
  if(blankIdx.length) html += `<div class="ov-section-title">二、填空题（${blankIdx.length}题）</div>` + renderOverviewGrid(blankIdx);
  content.innerHTML = html;
  content.querySelectorAll(".ov-item").forEach(el=>{
    el.addEventListener("click", ()=>{
      session.idx = parseInt(el.dataset.idx, 10);
      closeOverview();
      showScreen("quiz");
      renderQuestion();
    });
  });
}

function finishQuiz(){
  if(autoAdvanceTimer){ clearTimeout(autoAdvanceTimer); autoAdvanceTimer=null; }
  const stats = sessionStats();
  const total = session.queue.length;
  const durationSec = Math.round((Date.now()-session.startTime)/1000);
  const rate = total? Math.round(stats.correct/total*100):0;
  history.unshift({ date: Date.now(), scope: session.scopeLabel, total, correct: stats.correct, wrong: stats.wrong, rate, durationSec });
  if(history.length>100) history = history.slice(0,100);
  saveJSON(LS_HISTORY, history);
  document.getElementById("resTotal").textContent = total;
  document.getElementById("resAnswered").textContent = stats.correct+stats.wrong;
  document.getElementById("resUnanswered").textContent = total-(stats.correct+stats.wrong);
  document.getElementById("resCorrect").textContent = stats.correct;
  document.getElementById("resWrong").textContent = stats.wrong;
  document.getElementById("resRate").textContent = rate+"%";
  document.getElementById("resTime").textContent = fmtTime(durationSec);
  showScreen("result");
}

document.getElementById("backToQuizBtn").onclick=()=>{ showScreen("quiz"); renderQuestion(); };
document.getElementById("retryAllBtn").onclick=()=>{ startQuiz(session.queue, session.scopeLabel); };
document.getElementById("retryWrongBtn").onclick=()=>{
  const wrongList = session.queue.filter((q,i)=>session.answers[i] && !session.answers[i].allCorrect);
  if(wrongList.length===0){ alert("本次没有错题，太棒了！"); return; }
  startQuiz(wrongList, "本次错题重练");
};
document.getElementById("backHomeBtn").onclick=()=>{ renderCatList(); showScreen("home"); };

function renderResultList(wantCorrect){
  document.getElementById("resultListTitle").textContent = wantCorrect ? "答对的题目" : "答错的题目";
  const body = document.getElementById("resultListBody");
  const items = [];
  session.queue.forEach((q,i)=>{
    const a = session.answers[i];
    if(a && a.allCorrect===wantCorrect) items.push({q,a});
  });
  if(items.length===0){ body.innerHTML = `<div class="empty">没有符合条件的题目</div>`; return; }
  body.innerHTML = items.map(({q,a})=>{
    const plain = q.text + (q.code? "\n"+q.code.replace(/\{\{\}\}/g,"____") : "");
    let yourAnsText, correctAnsText;
    if(q.type==="mcq"){
      yourAnsText = a.selectedOpt ? `${a.selectedOpt}. ${q.options[a.selectedOpt]}` : "未作答";
      correctAnsText = `${q.correct}. ${q.options[q.correct]}`;
    } else {
      yourAnsText = a.userInputs.join("、");
      correctAnsText = q.ans.map(x=>x.split("|")[0]).join("、");
    }
    return `<div class="review-item">
      <div class="qtext">${escapeHtml(plain)}</div>
      <div class="your-ans" style="color:${a.allCorrect?'var(--green)':'var(--red)'}">你的答案：${escapeHtml(yourAnsText)}</div>
      <div class="correct-ans-line">正确答案：${escapeHtml(correctAnsText)}</div>
    </div>`;
  }).join("");
}
document.getElementById("resCorrectBox").onclick=()=>{ renderResultList(true); showScreen("resultlist"); };
document.getElementById("resWrongBox").onclick=()=>{ renderResultList(false); showScreen("resultlist"); };
document.getElementById("resultListBackBtn").onclick=()=>{ showScreen("result"); };

document.getElementById("startBtn").onclick=()=>{
  const checked = [...document.querySelectorAll(".catChk:checked")].map(c=>c.value);
  if(checked.length===0){ alert("请至少选择一个章节"); return; }
  const pool = QUESTIONS.filter(q=>checked.includes(q.cat));
  startQuiz(pool, checked.length===CATS.length? "全部章节" : checked.join("、"));
};

/* ===================== 错题本 ===================== */
function renderWrongbook(){
  const items = Object.entries(wrongbook).map(([id,w])=>({id,...w}));
  const summary = document.getElementById("wrongbookSummary");
  const list = document.getElementById("wrongbookList");
  if(items.length===0){
    summary.innerHTML = `<div class="empty">暂无错题，继续保持！</div>`;
    list.innerHTML=""; return;
  }
  summary.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>共 <b>${items.length}</b> 道错题</div>
      <button class="btn" id="practiceWrongBtn">练习全部错题</button>
    </div>`;
  document.getElementById("practiceWrongBtn").onclick=()=>{
    const pool = items.map(it=>QUESTIONS.find(q=>q.id===it.id)).filter(Boolean);
    startQuiz(pool, "错题本练习");
  };
  items.sort((a,b)=>b.lastWrongAt-a.lastWrongAt);
  list.innerHTML = items.map(it=>{
    const plain = it.text.replace(/\{\{\}\}/g,"____");
    let ansText="";
    if(it.type==="mcq") ansText = it.correct + "  " + (it.options? it.options[it.correct]:"");
    else ansText = (it.ans||[]).map(a=>a.split("|")[0]).join("  /  ");
    const streak = it.correctStreak||0;
    return `<div class="wrong-item">
      <div class="top"><span>${it.cat}</span><span>错${it.wrongCount}次 · ${fmtDate(it.lastWrongAt)}</span></div>
      <div class="qtext">${escapeHtml(plain)}</div>
      <div class="ans">答案：${escapeHtml(ansText)}</div>
      <div class="note">已连续答对 ${streak}/3 次${streak>0?"，再连续答对"+(3-streak)+"次将自动从错题本移除":""}</div>
    </div>`;
  }).join("");
}

/* ===================== 历史记录 ===================== */
function renderHistory(){
  const list = document.getElementById("historyList");
  if(history.length===0){ list.innerHTML = `<div class="empty">还没有练习记录，快去开始第一次练习吧～</div>`; return; }
  list.innerHTML = history.map(h=>`
    <div class="history-item">
      <div class="top"><span>${fmtDate(h.date)}</span><span>用时 ${fmtTime(h.durationSec)}</span></div>
      <div>${h.scope} · 共${h.total}题 · 对<b style="color:var(--green)">${h.correct}</b> 错<b style="color:var(--red)">${h.wrong}</b> · 正确率 <b>${h.rate}%</b></div>
    </div>
  `).join("");
}
document.getElementById("clearHistoryBtn").onclick=()=>{
  if(confirm("确定清空所有练习记录吗？此操作不可恢复。")){ history=[]; saveJSON(LS_HISTORY, history); renderHistory(); }
};

renderCatList();
